function getProductId() {
  const params = new URLSearchParams(window.location.search);
  return parseInt(params.get('id'));
}

function renderNotFound() {
  document.getElementById('pageContent').innerHTML = `
    <div class="not-found">
      <div class="not-found-title">Product Not Found</div>
      <div class="not-found-sub">The product you're looking for doesn't exist or may have been removed.</div>
      <a href="index.html#products" class="btn-back">Browse Collection</a>
    </div>
  `;
}

function renderProduct(p) {
  document.title = `StoneCore — ${p.name}`;

  const imagesHtml = p.images.map((src, i) => `
    <button class="thumb ${i === 0 ? 'active' : ''}" data-index="${i}" onclick="switchImage(${i})">
      <img src="${src}" alt="${p.name} view ${i+1}" onerror="this.parentElement.style.display='none'">
    </button>
  `).join('');

  const featuresHtml = p.features.map(f => `<li>${f}</li>`).join('');

  const detailsHtml = Object.entries(p.details).map(([k, v]) => `
    <div class="detail-item">
      <div class="detail-label">${k}</div>
      <div class="detail-val">${v}</div>
    </div>
  `).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="detail-wrap">
      <div class="detail-gallery">
        <img class="main-img" id="mainImg" src="${p.images[0]}" alt="${p.name}">
        <div class="thumb-row">${imagesHtml}</div>
      </div>

      <div class="detail-info">
        <div class="breadcrumb">
          <a href="index.html">Home</a>
          <span>/</span>
          <a href="index.html#products">Collection</a>
          <span>/</span>
          ${p.category}
        </div>

        <div class="product-category">${p.category}</div>
        <h1 class="product-title">${p.nameEm}</h1>

        <div class="price-row">
          <div class="price-main">₹ ${p.price.toLocaleString('en-IN')}</div>
          <div class="price-note">Handmade · Ships across India</div>
        </div>

        <p class="desc-text">${p.description}</p>

        <div class="features-title">Key Features</div>
        <ul class="features-list">${featuresHtml}</ul>

        <div class="details-grid">${detailsHtml}</div>

        <div class="enquiry-section">
          <div class="enquiry-title">Enquire About This Piece</div>
          <div class="enquiry-sub">Fill the form below and we'll get back to you within 24 hours.</div>
          <div id="enquiryForm">
            <div class="form-row">
              <div class="form-field">
                <label>Your Name</label>
                <input type="text" id="fname" placeholder="Rahul Sharma">
              </div>
              <div class="form-field">
                <label>Phone Number</label>
                <input type="tel" id="fphone" placeholder="+91 98765 43210">
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label>Email Address</label>
                <input type="email" id="femail" placeholder="you@email.com">
              </div>
              <div class="form-field">
                <label>City</label>
                <input type="text" id="fcity" placeholder="Delhi">
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label>Quantity</label>
                <select id="fqty">
                  <option value="1">1 piece</option>
                  <option value="2">2 pieces</option>
                  <option value="3">3 pieces</option>
                  <option value="4+">4+ pieces (bulk)</option>
                </select>
              </div>
              <div class="form-field">
                <label>Purpose</label>
                <select id="fpurpose">
                  <option value="Home Decor">Home Decor</option>
                  <option value="Gift">Gift</option>
                  <option value="Office">Office</option>
                  <option value="Corporate Gifting">Corporate Gifting</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field full">
                <label>Message (optional)</label>
                <textarea id="fmsg" placeholder="Any custom requirements, size preferences, or questions..."></textarea>
              </div>
            </div>
            <button class="btn-enquire" onclick="submitEnquiry()">Send Enquiry →</button>
          </div>
          <div class="form-success" id="formSuccess">
            <div class="form-success-icon">🪴</div>
            <div class="form-success-text">Enquiry Received!</div>
            <div class="form-success-sub">Thank you for your interest in <strong>${p.name}</strong>.<br>We'll reach out to you within 24 hours.</div>
          </div>

          <div class="trust-row">
            <div class="trust-item"><span class="trust-icon">🤝</span> 100% Handmade</div>
            <div class="trust-item"><span class="trust-icon">📦</span> Ships across India</div>
            <div class="trust-item"><span class="trust-icon">✨</span> Unique every piece</div>
          </div>
        </div>
      </div>
    </div>
  `;

  window._currentProduct = p;
}

function switchImage(index) {
  const p = window._currentProduct;
  if (!p) return;
  document.getElementById('mainImg').src = p.images[index];
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === index);
  });
}

function submitEnquiry() {
  const name = document.getElementById('fname').value.trim();
  const phone = document.getElementById('fphone').value.trim();
  const email = document.getElementById('femail').value.trim();

  if (!name || !phone) {
    alert('Please fill in your name and phone number.');
    return;
  }

  const p = window._currentProduct;
  const qty = document.getElementById('fqty').value;
  const purpose = document.getElementById('fpurpose').value;
  const city = document.getElementById('fcity').value;
  const msg = document.getElementById('fmsg').value;

  console.log('Enquiry:', { product: p.name, name, phone, email, city, qty, purpose, msg });

  document.getElementById('enquiryForm').style.display = 'none';
  document.getElementById('formSuccess').style.display = 'block';
}

const id = getProductId();
const product = PRODUCTS.find(p => p.id === id);
product ? renderProduct(product) : renderNotFound();

const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursorRing');
if (cursor && cursorRing) {
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    cursorRing.style.left = e.clientX + 'px';
    cursorRing.style.top = e.clientY + 'px';
  });
}
</script>
