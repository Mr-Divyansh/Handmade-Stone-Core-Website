<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoneCore — Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --stone: #2c2825;
  --clay: #8a7060;
  --sand: #d4c4b0;
  --moss: #5a6b4a;
  --red: #c0392b;
  --cream: #f5f0e8;
  --white: #fdfaf5;
  --gold: #b8986a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--white);
  color: var(--stone);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
}

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28px 60px;
  background: rgba(253, 250, 245, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--sand);
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  letter-spacing: 0.25em;
  color: var(--stone);
  text-decoration: none;
}

.logo span {
  color: var(--red);
}

.nav-back {
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--clay);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: color 0.3s;
}

.nav-back:hover {
  color: var(--red);
}

.nav-back::before {
  content: '←';
  font-size: 16px;
}

.checkout-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 120px 60px 80px;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 60px;
}

.order-summary {
  background: var(--cream);
  padding: 32px;
  height: fit-content;
  position: sticky;
  top: 120px;
}

.summary-title {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  letter-spacing: 0.2em;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--sand);
}

.product-preview {
  display: flex;
  gap: 20px;
  margin-bottom: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--sand);
}

.preview-img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  background: var(--white);
}

.preview-details h4 {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 8px;
}

.preview-price {
  font-size: 13px;
  color: var(--clay);
}

.preview-qty {
  font-size: 12px;
  color: var(--clay);
  margin-top: 8px;
}

.price-breakdown {
  margin-bottom: 24px;
}

.price-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  font-size: 14px;
}

.price-row.total {
  padding-top: 16px;
  border-top: 1px solid var(--sand);
  font-weight: 600;
  font-size: 18px;
  color: var(--red);
}

.checkout-form {
  background: var(--white);
}

.form-title {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  letter-spacing: 0.2em;
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--clay);
  margin-bottom: 8px;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--sand);
  font-family: 'Jost', sans-serif;
  font-size: 14px;
  color: var(--stone);
  background: var(--white);
  outline: none;
  transition: border-color 0.3s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--clay);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.btn-place-order {
  width: 100%;
  background: var(--red);
  color: white;
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 18px;
  border: none;
  cursor: pointer;
  margin-top: 16px;
  transition: background 0.3s;
}

.btn-place-order:hover {
  background: var(--stone);
}

.payment-methods {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--sand);
}

.payment-title {
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 12px;
}

.payment-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  cursor: pointer;
}

.payment-option input {
  width: auto;
  margin: 0;
}

.success-message {
  display: none;
  text-align: center;
  padding: 60px 40px;
  background: var(--cream);
}

.success-icon {
  font-size: 64px;
  margin-bottom: 20px;
}

.success-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  margin-bottom: 12px;
}

.success-sub {
  color: var(--clay);
  margin-bottom: 24px;
}

.btn-continue {
  background: var(--stone);
  color: var(--cream);
  padding: 14px 32px;
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  display: inline-block;
}

@media (max-width: 900px) {
  nav {
    padding: 20px 24px;
  }
  
  .checkout-wrap {
    grid-template-columns: 1fr;
    padding: 100px 24px 60px;
    gap: 40px;
  }
  
  .order-summary {
    position: relative;
    top: 0;
  }
  
  .form-row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Stone<span>Core</span></a>
  <a href="product-detail.html" class="nav-back">Back to Product</a>
</nav>

<div id="checkoutContent"></div>

<script>
const PRODUCTS = [
  {
    id: 1,
    name: 'Handcrafted Miniature Zen Garden Diorama',
    category: 'Zen Stack',
    price: 1899,
    images: ['Product/Handcrafted Miniature Zen Garden Diorama with Bonsai & Natural Stones/Handcrafted Miniature Zen Garden Diorama with Bonsai & Natural Stones 1.png']
  },
  {
    id: 2,
    name: 'Harmony Bridge Zen Garden',
    category: 'Bridge Series',
    price: 2299,
    images: ['Product/Harmony Bridge Zen Garden – Handcrafted Miniature Bonsai Diorama/Harmony Bridge Zen Garden – Handcrafted Miniature Bonsai Diorama 1.png']
  },
  {
    id: 3,
    name: 'Serene Monk Bonsai Garden',
    category: 'Monk Series',
    price: 2499,
    images: ['Product/Serene Monk Bonsai Garden – Handcrafted Miniature Zen Diorama/Serene Monk Bonsai Garden – Handcrafted Miniature Zen Diorama 1.png']
  },
  {
    id: 4,
    name: 'Stone Lantern Bonsai Retreat',
    category: 'Bonsai Collection',
    price: 1999,
    images: ['Product/Stone Lantern Bonsai Retreat/Stone Lantern Bonsai Retreat 1.png']
  },
  {
    id: 5,
    name: 'Whispering Bonsai Sanctuary',
    category: 'Bonsai Collection',
    price: 2199,
    images: ['Product/Whispering Bonsai Sanctuary – Miniature Zen Garden with Apple Perch/Whispering Bonsai Sanctuary – Miniature Zen Garden with Apple Perch 1.png']
  },
  {
    id: 6,
    name: 'Whispering Monk Zen Garden',
    category: 'Monk Series',
    price: 1799,
    images: ['Product/Whispering Monk Zen Garden/Whispering Monk Zen Garden1.png']
  }
];

function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    id: parseInt(params.get('id')),
    qty: parseInt(params.get('qty')) || 1
  };
}

function renderCheckout() {
  const { id, qty } = getQueryParams();
  const product = PRODUCTS.find(p => p.id === id);
  
  if (!product) {
    document.getElementById('checkoutContent').innerHTML = `
      <div style="text-align: center; padding: 100px;">
        <h2>Product not found</h2>
        <a href="index.html" style="color: var(--red);">Back to Shop</a>
      </div>
    `;
    return;
  }
  
  const subtotal = product.price * qty;
  const shipping = subtotal > 999 ? 0 : 99;
  const total = subtotal + shipping;
  
  document.getElementById('checkoutContent').innerHTML = `
    <div class="checkout-wrap">
      <div class="order-summary">
        <div class="summary-title">Order Summary</div>
        
        <div class="product-preview">
          <img class="preview-img" src="${product.images[0]}" alt="${product.name}" onerror="this.src='placeholder.jpg'">
          <div class="preview-details">
            <h4>${product.name}</h4>
            <div class="preview-price">₹ ${product.price.toLocaleString('en-IN')}</div>
            <div class="preview-qty">Quantity: ${qty}</div>
          </div>
        </div>
        
        <div class="price-breakdown">
          <div class="price-row">
            <span>Subtotal</span>
            <span>₹ ${subtotal.toLocaleString('en-IN')}</span>
          </div>
          <div class="price-row">
            <span>Shipping</span>
            <span>${shipping === 0 ? 'FREE' : '₹ ' + shipping}</span>
          </div>
          <div class="price-row total">
            <span>Total</span>
            <span>₹ ${total.toLocaleString('en-IN')}</span>
          </div>
        </div>
        
        <div style="font-size: 12px; color: var(--clay); text-align: center;">
          ✅ Free delivery on orders above ₹999<br>
          🔄 7-day easy returns
        </div>
      </div>
      
      <div class="checkout-form" id="checkoutForm">
        <div class="form-title">Shipping Details</div>
        
        <div class="form-row">
          <div class="form-group">
            <label>First Name *</label>
            <input type="text" id="firstName" placeholder="Rahul">
          </div>
          <div class="form-group">
            <label>Last Name *</label>
            <input type="text" id="lastName" placeholder="Sharma">
          </div>
        </div>
        
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" placeholder="rahul@example.com">
        </div>
        
        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210">
        </div>
        
        <div class="form-group">
          <label>Address *</label>
          <input type="text" id="address" placeholder="House No., Street, Area">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>City *</label>
            <input type="text" id="city" placeholder="Mumbai">
          </div>
          <div class="form-group">
            <label>Pincode *</label>
            <input type="text" id="pincode" placeholder="400001">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>State *</label>
            <select id="state">
              <option value="">Select State</option>
              <option>Maharashtra</option>
              <option>Delhi</option>
              <option>Karnataka</option>
              <option>Tamil Nadu</option>
              <option>Uttar Pradesh</option>
              <option>Gujarat</option>
              <option>West Bengal</option>
              <option>Rajasthan</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Country</label>
            <input type="text" value="India" disabled style="background: var(--cream);">
          </div>
        </div>
        
        <div class="payment-methods">
          <div class="payment-title">Payment Method</div>
          
          <label class="payment-option">
            <input type="radio" name="payment" value="cod" checked>
            <span>💵 Cash on Delivery (COD)</span>
          </label>
          
          <label class="payment-option">
            <input type="radio" name="payment" value="online">
            <span>💳 Credit/Debit Card / UPI (Online)</span>
          </label>
        </div>
        
        <div class="form-group">
          <label>Additional Notes (Optional)</label>
          <textarea id="notes" rows="3" placeholder="Any special instructions..."></textarea>
        </div>
        
        <button class="btn-place-order" onclick="placeOrder(${product.id}, ${qty}, ${total})">Place Order →</button>
      </div>
      
      <div class="success-message" id="successMessage">
        <div class="success-icon">🎉</div>
        <div class="success-title">Order Placed Successfully!</div>
        <div class="success-sub">Thank you for shopping with StoneCore.<br>We will contact you within 24 hours.</div>
        <a href="index.html" class="btn-continue">Continue Shopping →</a>
      </div>
    </div>
  `;
}

function placeOrder(productId, qty, total) {
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const address = document.getElementById('address').value.trim();
  const city = document.getElementById('city').value.trim();
  const pincode = document.getElementById('pincode').value.trim();
  const state = document.getElementById('state').value;
  const payment = document.querySelector('input[name="payment"]:checked').value;
  const notes = document.getElementById('notes').value;
  
  if (!firstName || !lastName || !email || !phone || !address || !city || !pincode || !state) {
    alert('Please fill in all required fields.');
    return;
  }
  
  if (!email.includes('@')) {
    alert('Please enter a valid email address.');
    return;
  }
  
  if (phone.length < 10) {
    alert('Please enter a valid phone number.');
    return;
  }
  
  if (pincode.length !== 6) {
    alert('Please enter a valid 6-digit pincode.');
    return;
  }
  
  const orderDetails = {
    productId: productId,
    quantity: qty,
    total: total,
    customer: { firstName, lastName, email, phone },
    address: { address, city, pincode, state },
    payment: payment,
    notes: notes,
    orderDate: new Date().toISOString()
  };
  
  console.log('Order Placed:', orderDetails);
  
  document.getElementById('checkoutForm').style.display = 'none';
  document.getElementById('successMessage').style.display = 'block';
  
  localStorage.setItem('lastOrder', JSON.stringify(orderDetails));
}

renderCheckout();
</script>
</body>
</html>
