# Netlify Build Configuration for StoneCore
# Note: Netlify doesn't execute PHP. Use vendor/ files as static assets only,
# or migrate PHP APIs to Netlify Functions, AWS Lambda, or another serverless platform.

[build]
  publish = "."

# Redirect all routes to index.html for SPA routing (if needed)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # Exclude actual files and directories
  conditions = { Path = ["!/api/*", "!/css/*", "!/js/*", "!/img/*", "!/vendor/*", "!/composer.json"] }
